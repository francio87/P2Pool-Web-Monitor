services:
  p2pool-mini:
    image: ghcr.io/sethforprivacy/p2pool:latest
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      - p2pool-data:/home/p2pool
      - /dev/hugepages:/dev/hugepages
    ports:
      - "35443:3333"
      - "37888:37888"
    command: >-
      --wallet REPLACE_WITH_YOUR_MONERO_WALLET
      --host p2pmd.xmrvsbeast.com --rpc-port 18081 --zmq-port 18084
      --host node2.monerodevs.org --rpc-port 18089 --zmq-port 18084
      --host xmr-full.p2pool.uk --rpc-port 18089 --zmq-port 18084
      --host xmr-pruned.p2pool.uk --rpc-port 18089 --zmq-port 18084
      --stratum 0.0.0.0:3333
      --light-mode
      --mini
      --local-api
      --data-api /home/p2pool
      --no-upnp
      --stratum-api

  p2pool-wm:
    image: ghcr.io/francio87/p2pool-web-monitor:latest
    restart: unless-stopped
    volumes:
      - p2pool-data:/p2pool-data:ro
      - wm-output:/output
    depends_on:
      - p2pool-mini

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3380:80"
    volumes:
      - wm-output:/usr/share/nginx/html:ro
    depends_on:
      - p2pool-wm

volumes:
  p2pool-data:
  wm-output:
